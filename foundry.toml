[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.33"
optimizer = true
optimizer_runs = 200
# Self-contained: no external deps, `forge build` works offline.
# Mocks live in src/mocks so they ship with the scaffold; tests (later) go in test/.

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
